<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>UNENDLICH · ID · ∞</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; text-align:center; padding:40px; }

#geo {
    width: 360px;
    height: 180px;
    margin: auto;
    position: relative;
}

.dot {
    width: 10px;
    height: 10px;
    background:#0f0;
    border-radius:50%;
    position:absolute;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}

#wrap {
    animation: spin 12s linear infinite;
}
</style>
</head>

<body>

<h1>UNENDLICH · ID · ∞</h1>

<div id="wrap">
    <div id="geo"></div>
</div>

<script>
const geo = document.getElementById("geo");
const count = 81;
const radiusX = 150;
const radiusY = 70;

for(let i=0; i<count; i++){
    const dot = document.createElement("div");
    dot.className = "dot";

    const angle = (i / count) * Math.PI * 2;

    const x = Math.cos(angle) * radiusX + 180 - 5;
    const y = Math.sin(angle) * radiusY + 90 - 5;

    dot.style.left = x + "px";
    dot.style.top = y + "px";

    geo.appendChild(dot);
}
</script>

</body>
</html>
